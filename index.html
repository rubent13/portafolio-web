<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Diseño & Desarrollo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .backdrop-blur-xl { backdrop-filter: blur(24px); }
        
        /* Contenedor 3D de Fondo Completo */
        #canvas-container {
            position: absolute;
            inset: 0;
            width: 100%; 
            height: 100%;
            z-index: 0; 
            overflow: hidden;
        }
        
        /* El contenido debe estar por encima */
        .hero-content {
            position: relative;
            z-index: 10;
            pointer-events: auto; /* Permitir clic en botones */
        }

        /* TEXT GLOW: Sutil para separar texto del fondo colorido */
        .text-glow-bg {
            background: radial-gradient(circle at center, rgba(245,245,247,0.5) 0%, rgba(245,245,247,0.2) 40%, rgba(245,245,247,0) 70%);
            backdrop-filter: blur(1px);
        }

        /* --- ANIMACIONES DE INTERACCIÓN SIMULADA (NUEVO) --- */
        @keyframes browser-scroll {
            0% { transform: translateY(0); }
            20% { transform: translateY(0); } /* Espera arriba */
            50% { transform: translateY(-25%); } /* Baja */
            70% { transform: translateY(-25%); } /* Espera abajo */
            100% { transform: translateY(0); } /* Vuelve arriba */
        }

        @keyframes cursor-path {
            0% { left: 80%; top: 80%; transform: scale(1); }
            20% { left: 20%; top: 20%; transform: scale(1); }
            25% { transform: scale(0.85); } /* Clic */
            30% { transform: scale(1); }
            50% { left: 50%; top: 60%; transform: scale(1); }
            70% { left: 70%; top: 30%; transform: scale(1); }
            75% { transform: scale(0.85); } /* Clic */
            80% { transform: scale(1); }
            100% { left: 80%; top: 80%; transform: scale(1); }
        }

        .simulated-page {
            width: 100%;
            height: 140%; 
            object-fit: cover;
            object-position: top;
            animation: browser-scroll 12s ease-in-out infinite;
        }

        .simulated-cursor {
            position: absolute;
            width: 16px; 
            height: 16px;
            z-index: 50;
            pointer-events: none;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
            animation: cursor-path 8s ease-in-out infinite;
        }

        .delay-1 .simulated-page { animation-delay: 0s; }
        .delay-1 .simulated-cursor { animation-delay: 0s; }
        .delay-2 .simulated-page { animation-delay: 2s; }
        .delay-2 .simulated-cursor { animation-delay: 3s; }
        .delay-3 .simulated-page { animation-delay: 4s; }
        .delay-3 .simulated-cursor { animation-delay: 1.5s; }
    </style>
</head>
<body class="bg-[#F5F5F7] text-[#1D1D1F] selection:bg-blue-500/20">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS ---
        const IconArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconMail = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const IconTwitter = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>;
        const IconGithub = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>;
        const IconLinkedin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>;
        const IconLock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconChevronDown = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const IconLayers = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const IconSmartphone = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
        const IconGlobe = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
        const IconX = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 18 18"/></svg>;
        const IconMenu = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const IconSend = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
        const IconInfo = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

        // --- BACKGROUND 3D: "LA FÁBRICA HOLOGRÁFICA" (GRANDE) ---
        const ThreeBackground = ({ isSplash }) => {
            const mountRef = useRef(null);
            const mouse = useRef({ x: 0, y: 0 }); 
            const splashRef = useRef(isSplash);

            useEffect(() => {
                splashRef.current = isSplash;
            }, [isSplash]);

            useEffect(() => {
                const mount = mountRef.current;
                if (!mount) return;

                // --- 1. CONFIGURACIÓN ---
                const scene = new THREE.Scene();
                const bgCol = 0xF5F5F7; 
                scene.background = new THREE.Color(bgCol); 
                // NIEBLA AJUSTADA: Más lejos para que se vea claro y grande
                scene.fog = new THREE.Fog(bgCol, 45, 110); 

                const width = mount.clientWidth;
                const height = mount.clientHeight;
                
                // Cámara Isométrica (ZOOM AUMENTADO: viewSize reducido a 18)
                const viewSize = 18; 
                const aspect = width / height;
                const camera = new THREE.OrthographicCamera(
                    -viewSize * aspect, viewSize * aspect, viewSize, -viewSize, 1, 1000
                );
                
                // Posición dramática inicial para la órbita del Splash
                camera.position.set(0, 50, 40); 
                camera.zoom = 0.5;
                camera.lookAt(scene.position);

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                mount.appendChild(renderer.domElement);

                // --- 2. ILUMINACIÓN ---
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
                dirLight.position.set(30, 60, 30);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 1024;
                dirLight.shadow.mapSize.height = 1024;
                scene.add(dirLight);

                const light1 = new THREE.PointLight(0xFF0080, 0.5, 50); // Magenta
                light1.position.set(-15, 10, 15);
                scene.add(light1);

                const light2 = new THREE.PointLight(0x0070F3, 0.5, 50); // Azul
                light2.position.set(15, 10, -15);
                scene.add(light2);

                const light3 = new THREE.PointLight(0x00FFFF, 0.6, 50); // Cyan
                light3.position.set(-10, 20, -10);
                scene.add(light3);

                const light4 = new THREE.PointLight(0xFFFF00, 0.5, 50); // Amarillo
                light4.position.set(10, 5, 20);
                scene.add(light4);

                // --- PARTICULAS HOLOGRÁFICAS MÁGICAS ---
                const particlesGeo = new THREE.BufferGeometry();
                const particlesCount = 400;
                const posArray = new Float32Array(particlesCount * 3);
                const colorsArray = new Float32Array(particlesCount * 3);
                for(let i=0; i<particlesCount*3; i+=3) {
                    posArray[i] = (Math.random() - 0.5) * 60;   
                    posArray[i+1] = Math.random() * 30;         
                    posArray[i+2] = (Math.random() - 0.5) * 60; 
                    const color = new THREE.Color();
                    color.setHSL(Math.random(), 0.9, 0.6); 
                    colorsArray[i] = color.r; colorsArray[i+1] = color.g; colorsArray[i+2] = color.b;
                }
                particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                particlesGeo.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
                const particlesMat = new THREE.PointsMaterial({ size: 0.25, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
                const particles = new THREE.Points(particlesGeo, particlesMat);
                scene.add(particles);

                // --- 3. CONSTRUCCIÓN DE LA ESCENA ---
                const group = new THREE.Group();
                scene.add(group);

                // --- MATERIALES ---
                const matMachinePrimary = new THREE.MeshStandardMaterial({ color: 0xF5A623, roughness: 0.3 }); // Amarillo Maquinaria
                const matMachineSecondary = new THREE.MeshStandardMaterial({ color: 0x2D3748, roughness: 0.5 }); 
                const matConveyor = new THREE.MeshStandardMaterial({ color: 0x4A5568, roughness: 0.8 });
                const matFloor = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.2 });
                const matScanner = new THREE.MeshBasicMaterial({ color: 0x00FF00, transparent: true, opacity: 0.2 });
                const matDrone = new THREE.MeshStandardMaterial({ color: 0xE2E8F0, roughness: 0.3 });
                const matDarkMetal = new THREE.MeshStandardMaterial({ color: 0x1A202C }); // CORREGIDO: Definido antes de uso

                // Materiales para los "Bloques Web"
                const matUI_Wireframe = new THREE.LineBasicMaterial({ color: 0xCBD5E0 });
                const matUI_Solid_Blue = new THREE.MeshLambertMaterial({ color: 0x3182CE });
                const matUI_Solid_Pink = new THREE.MeshLambertMaterial({ color: 0xD53F8C });
                const matUI_Solid_Yellow = new THREE.MeshLambertMaterial({ color: 0xEAB308 });
                const matUI_Solid_Green = new THREE.MeshLambertMaterial({ color: 0x22C55E });
                const itemColors = [matUI_Solid_Blue, matUI_Solid_Pink, matUI_Solid_Yellow, matUI_Solid_Green];
                const matUI_Glass = new THREE.MeshPhysicalMaterial({ color: 0xFFFFFF, transmission: 0.9, transparent: true });

                // A. Base Grid
                const floorGeo = new THREE.BoxGeometry(60, 1, 60);
                const floor = new THREE.Mesh(floorGeo, matFloor);
                floor.position.y = -2.5;
                floor.receiveShadow = true;
                group.add(floor);

                const gridHelper = new THREE.GridHelper(60, 30, 0xCBD5E0, 0xE2E8F0);
                gridHelper.position.y = -1.9;
                group.add(gridHelper);

                // B. Cinta Transportadora
                const conveyorGroup = new THREE.Group();
                const beltGeo = new THREE.BoxGeometry(50, 0.5, 4);
                const belt = new THREE.Mesh(beltGeo, matConveyor);
                belt.position.set(0, -1.5, 0);
                belt.receiveShadow = true;
                conveyorGroup.add(belt);
                group.add(conveyorGroup);

                // C. Escáner Holográfico
                const scannerArch = new THREE.Group();
                const archLegGeo = new THREE.BoxGeometry(1, 6, 1);
                const leg1 = new THREE.Mesh(archLegGeo, matMachineSecondary);
                leg1.position.set(0, 1.5, 2.5);
                const leg2 = new THREE.Mesh(archLegGeo, matMachineSecondary);
                leg2.position.set(0, 1.5, -2.5);
                
                const archTopGeo = new THREE.BoxGeometry(1, 1, 6);
                const top = new THREE.Mesh(archTopGeo, matMachineSecondary);
                top.position.set(0, 4.5, 0);
                
                const beamGeo = new THREE.BoxGeometry(0.1, 5, 4);
                const beam = new THREE.Mesh(beamGeo, matScanner);
                beam.position.set(0, 1.5, 0);
                
                scannerArch.add(leg1, leg2, top, beam);
                scannerArch.position.x = 0; 
                group.add(scannerArch);

                // D. Brazos Robóticos
                const createRobotArm = (x, z, side) => {
                    const armGroup = new THREE.Group();
                    armGroup.position.set(x, -2, z);
                    const base = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2, 1, 16), matMachineSecondary);
                    base.position.y = 0.5;
                    armGroup.add(base);
                    const axis = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3, 1.2), matMachinePrimary);
                    body.position.y = 2;
                    axis.add(body);
                    armGroup.add(axis);
                    const armSeg1 = new THREE.Group();
                    armSeg1.position.y = 3.5;
                    const segment1 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 5, 0.8), matMachinePrimary);
                    segment1.position.y = 2.5;
                    armSeg1.add(segment1);
                    axis.add(armSeg1);
                    const armSeg2 = new THREE.Group();
                    armSeg2.position.y = 5;
                    const segment2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 4, 0.6), matMachinePrimary);
                    segment2.position.y = 2;
                    armSeg2.add(segment2);
                    armSeg1.add(armSeg2);
                    const hand = new THREE.Group();
                    hand.position.set(0, 5, 0);
                    const claw = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.2), matDarkMetal);
                    hand.add(claw);
                    armSeg2.add(hand);
                    group.add(armGroup);
                    if (side === 'left') {
                        armGroup.rotation.y = -Math.PI / 2;
                        armSeg1.rotation.x = Math.PI / 4;
                        armSeg2.rotation.x = -Math.PI / 2;
                    } else {
                        armGroup.rotation.y = Math.PI / 2;
                        armSeg1.rotation.x = Math.PI / 4;
                        armSeg2.rotation.x = -Math.PI / 2;
                    }
                    return { root: armGroup, axis, seg1: armSeg1, seg2: armSeg2, speed: 0.02 + Math.random()*0.02, offset: Math.random()*100 };
                };

                const robots = [
                    createRobotArm(-8, 6, 'left'),
                    createRobotArm(8, -6, 'right')
                ];

                // E. Drones
                const createDrone = (x, z) => {
                    const drone = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1), matDrone);
                    drone.add(body);
                    const rotorGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.1, 8);
                    const rotorMat = new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.5 });
                    [[-0.8, -0.8], [0.8, -0.8], [0.8, 0.8], [-0.8, 0.8]].forEach(([dx, dz]) => {
                        const r = new THREE.Mesh(rotorGeo, rotorMat);
                        r.position.set(dx, 0.3, dz);
                        drone.add(r);
                    });
                    drone.position.set(x, 5, z);
                    group.add(drone);
                    return { root: drone, speed: 0.01 + Math.random()*0.01, angle: Math.random() * Math.PI * 2, radius: 10 + Math.random()*5 };
                };

                const drones = [createDrone(0, 0), createDrone(5, 5)];

                // F. Productos
                const items = [];
                for(let i=0; i<7; i++) {
                    const itemGroup = new THREE.Group();
                    const wfGeo = new THREE.BoxGeometry(2, 0.2, 1.5);
                    const wfEdges = new THREE.EdgesGeometry(wfGeo);
                    const wfMesh = new THREE.LineSegments(wfEdges, matUI_Wireframe);
                    itemGroup.add(wfMesh);
                    const solidMesh = new THREE.Mesh(wfGeo, itemColors[i % itemColors.length]);
                    solidMesh.scale.set(0.01, 0.01, 0.01); 
                    solidMesh.castShadow = true;
                    itemGroup.add(solidMesh);
                    const decor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matUI_Glass);
                    decor.position.y = 0.5;
                    decor.scale.set(0.01, 0.01, 0.01);
                    itemGroup.add(decor);
                    itemGroup.position.set(-25 + i*8, -1, 0);
                    itemGroup.userData = { wireframe: wfMesh, solid: solidMesh, decor: decor, startX: -25 + i*8 };
                    group.add(itemGroup);
                    items.push(itemGroup);
                }

                // G. Racks de Servidores (Backend / Hosting)
                const serverLeds = [];
                const serverGroup = new THREE.Group();
                const serverGeo = new THREE.BoxGeometry(2.5, 7, 3);
                for(let i=0; i<4; i++) {
                    const server = new THREE.Mesh(serverGeo, matDarkMetal);
                    server.position.set(-18 + i*4, 1, -12);
                    server.castShadow = true;
                    server.receiveShadow = true;
                    // Luces LED de procesamiento
                    for(let j=0; j<6; j++) {
                        const ledColor = j % 2 === 0 ? 0x00FFFF : 0x0070F3;
                        const led = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 0.1), new THREE.MeshBasicMaterial({ color: ledColor, transparent: true }));
                        led.position.set(0, -2 + j*0.8, 1.51);
                        server.add(led);
                        serverLeds.push({ mesh: led, speed: 5 + Math.random() * 10, offset: Math.random() * Math.PI });
                    }
                    serverGroup.add(server);
                }
                group.add(serverGroup);

                // H. Núcleo de Base de Datos (Database)
                const coreGroup = new THREE.Group();
                const coreBase = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 4, 2, 32), matMachineSecondary);
                coreBase.position.set(16, -1.5, -12);
                coreBase.receiveShadow = true;
                const corePillar = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 9, 32), matUI_Glass);
                corePillar.position.set(16, 4, -12);
                const coreInner = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 8, 8), new THREE.MeshBasicMaterial({ color: 0x0070F3 }));
                coreInner.position.set(16, 4, -12);
                
                const coreRings = [];
                for(let i=0; i<3; i++) {
                    const ring = new THREE.Mesh(new THREE.TorusGeometry(3, 0.15, 16, 64), new THREE.MeshStandardMaterial({ color: 0x00FFFF, metalness: 0.8, roughness: 0.2 }));
                    ring.position.set(16, 1.5 + i*2.5, -12);
                    ring.rotation.x = Math.PI / 2;
                    coreGroup.add(ring);
                    coreRings.push({ mesh: ring, speed: (i%2===0 ? 1 : -1) * (0.01 + i*0.005), yOffset: 1.5 + i*2.5 });
                }
                coreGroup.add(coreBase, corePillar, coreInner);
                group.add(coreGroup);

                // I. Pantallas Holográficas (Código / Frontend)
                const screens = [];
                const createScreen = (x, y, z, rotY) => {
                    const screen = new THREE.Group();
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.5), new THREE.MeshBasicMaterial({ color: 0x00FFFF, transparent: true, opacity: 0.15, side: THREE.DoubleSide, blending: THREE.AdditiveBlending }));
                    const border = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(4, 2.5)), new THREE.LineBasicMaterial({ color: 0x00FFFF, transparent: true, opacity: 0.5 }));
                    // Simulador de líneas de código
                    for(let i=0; i<4; i++) {
                        const lineWidth = 1 + Math.random() * 1.5;
                        const line = new THREE.Mesh(new THREE.PlaneGeometry(lineWidth, 0.08), new THREE.MeshBasicMaterial({ color: 0x00FFFF, transparent: true, opacity: 0.7 }));
                        line.position.set(-1.8 + lineWidth/2, 0.8 - i*0.5, 0.01);
                        screen.add(line);
                    }
                    screen.add(plane, border);
                    screen.position.set(x, y, z);
                    screen.rotation.y = rotY;
                    group.add(screen);
                    screens.push(screen);
                };
                createScreen(-8, 7, -6, Math.PI / 6);
                createScreen(8, 8, -2, -Math.PI / 5);

                // J. Tuberías de Datos (Pipelines)
                const pipeGroup = new THREE.Group();
                const createPipe = (x, z, h) => {
                    const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, h, 16), matConveyor);
                    pipe.position.set(x, h/2 - 2.5, z);
                    pipe.castShadow = true;
                    pipe.receiveShadow = true;
                    pipeGroup.add(pipe);
                };
                createPipe(-20, -16, 12);
                createPipe(-15, -16, 14);
                group.add(pipeGroup);

                // K. Globo Holográfico (World Wide Web)
                const globeGroup = new THREE.Group();
                const globeWire = new THREE.Mesh(new THREE.IcosahedronGeometry(3.5, 2), new THREE.MeshBasicMaterial({ color: 0x00FFFF, wireframe: true, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending }));
                const globeCore = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 1), new THREE.MeshBasicMaterial({ color: 0x0070F3, wireframe: true }));
                globeGroup.add(globeWire, globeCore);
                globeGroup.position.set(22, 12, 10);
                group.add(globeGroup);

                // L. Torres de Comunicación Satelital
                const towers = [];
                const createTower = (x, z) => {
                    const towerGroup = new THREE.Group();
                    const base = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 6, 8), matMachineSecondary);
                    base.position.y = 0.5;
                    const dishBase = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2), matDarkMetal);
                    dishBase.position.y = 4.5;
                    const dish = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 8, 0, Math.PI * 2, 0, Math.PI / 3), new THREE.MeshStandardMaterial({ color: 0xFFFFFF, side: THREE.DoubleSide, metalness: 0.8, roughness: 0.2 }));
                    dish.position.y = 5.5;
                    dish.rotation.x = Math.PI / 4;
                    const signalLight = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0xFF0080 }));
                    signalLight.position.set(0, 5.5, 1);
                    dish.add(signalLight);
                    towerGroup.add(base, dishBase, dish);
                    towerGroup.position.set(x, -2, z);
                    group.add(towerGroup);
                    towers.push({ root: towerGroup, dish: dish, signal: signalLight, speed: 0.5 + Math.random() * 0.5, angle: Math.random() * Math.PI });
                };
                createTower(-22, 18);
                createTower(-12, 22);

                // M. Paquetes de Datos Voladores (Cristales)
                const dataPackets = [];
                const packetGeo = new THREE.OctahedronGeometry(0.4);
                for(let i=0; i<15; i++) {
                    const packet = new THREE.Mesh(packetGeo, new THREE.MeshBasicMaterial({ color: itemColors[i % itemColors.length].color, transparent: true, opacity: 0.8 }));
                    group.add(packet);
                    dataPackets.push({
                        mesh: packet, t: Math.random() * Math.PI * 2, speed: 0.02 + Math.random() * 0.03,
                        radius: 15 + Math.random() * 15, yOffset: 5 + Math.random() * 10
                    });
                }

                // --- ANIMACIÓN ---
                const clock = new THREE.Clock();

                const animate = () => {
                    requestAnimationFrame(animate);
                    const time = clock.getElapsedTime();

                    // --- SPLASH LOGIC: Órbita Cinemática de Cámara ---
                    const targetZoom = splashRef.current ? 0.5 : 1;
                    const targetPosX = splashRef.current ? Math.sin(time * 0.3) * 50 : 30;
                    const targetPosY = splashRef.current ? 40 + Math.sin(time * 0.5) * 10 : 30;
                    const targetPosZ = splashRef.current ? Math.cos(time * 0.3) * 50 : 30;

                    // Interpolación fluida de la cámara (Vuelo hasta su posición)
                    camera.zoom += (targetZoom - camera.zoom) * 0.03;
                    camera.position.x += (targetPosX - camera.position.x) * 0.03;
                    camera.position.y += (targetPosY - camera.position.y) * 0.03;
                    camera.position.z += (targetPosZ - camera.position.z) * 0.03;
                    camera.lookAt(0, 0, 0);
                    camera.updateProjectionMatrix();

                    // Mouse Parallax suave
                    const targetRotX = mouse.current.y * 0.05; 
                    const targetRotY = mouse.current.x * 0.1;  
                    group.rotation.x += (targetRotX - group.rotation.x) * 0.05;
                    group.rotation.y += (targetRotY - group.rotation.y) * 0.05;

                    // Items
                    items.forEach(item => {
                        item.position.x += 0.06;
                        if(item.position.x > 25) {
                            item.position.x = -25; 
                            item.userData.wireframe.visible = true;
                            item.userData.solid.scale.set(0.01, 0.01, 0.01);
                            item.userData.decor.scale.set(0.01, 0.01, 0.01);
                        }
                        if(item.position.x > 0) { 
                            item.userData.wireframe.visible = false;
                            if(item.userData.solid.scale.x < 1) {
                                item.userData.solid.scale.lerp(new THREE.Vector3(1,1,1), 0.1);
                                item.userData.decor.scale.lerp(new THREE.Vector3(1,1,1), 0.1);
                            }
                        }
                    });

                    // Robots
                    robots.forEach(bot => {
                        bot.axis.rotation.y = Math.sin(time * bot.speed + bot.offset) * 0.5;
                        bot.seg1.rotation.x = Math.PI/4 + Math.sin(time * bot.speed * 2 + bot.offset) * 0.2;
                        bot.seg2.rotation.x = -Math.PI/2 + Math.sin(time * bot.speed * 2 + bot.offset + 1) * 0.3;
                    });

                    // Drones
                    drones.forEach(d => {
                        d.angle += d.speed;
                        d.root.position.x = Math.cos(d.angle) * d.radius;
                        d.root.position.z = Math.sin(d.angle) * d.radius;
                        d.root.position.y = 5 + Math.sin(time * 2 + d.angle) * 0.5;
                        d.root.lookAt(0, 0, 0);
                    });

                    // Partículas
                    particles.rotation.y = time * 0.05;
                    particles.position.y = Math.sin(time * 0.5) * 2;

                    // Animación de LEDs de Servidores (Tráfico de Datos)
                    serverLeds.forEach(led => {
                        led.mesh.material.opacity = Math.sin(time * led.speed + led.offset) > 0 ? 0.9 : 0.2;
                    });

                    // Animación de los Anillos del Núcleo de Base de Datos
                    coreRings.forEach(ring => {
                        ring.mesh.rotation.z += ring.speed;
                        ring.mesh.position.y = ring.yOffset + Math.sin(time * 2 + ring.yOffset) * 0.4;
                    });

                    // Levitación de Pantallas Holográficas
                    screens.forEach((screen, i) => {
                        screen.position.y += Math.sin(time * 1.5 + i) * 0.006;
                    });

                    // Animación del Globo
                    globeGroup.rotation.y = time * 0.2;
                    globeGroup.rotation.z = time * 0.1;
                    globeWire.scale.setScalar(1 + Math.sin(time * 2) * 0.05);

                    // Animación de las Torres
                    towers.forEach(tower => {
                        tower.dish.rotation.z = Math.sin(time * tower.speed + tower.angle) * 0.8;
                        tower.signal.material.opacity = Math.sin(time * 8 + tower.angle) > 0 ? 1 : 0.2;
                    });

                    // Animación de los Paquetes de Datos Voladores
                    dataPackets.forEach(p => {
                        p.t += p.speed;
                        p.mesh.position.set(Math.cos(p.t) * p.radius, p.yOffset + Math.sin(p.t * 3) * 2, Math.sin(p.t) * (p.radius * 0.5));
                        p.mesh.rotation.x += 0.05;
                        p.mesh.rotation.y += 0.05;
                    });

                    beam.material.opacity = 0.2 + Math.sin(time * 10) * 0.1;
                    renderer.render(scene, camera);
                };

                const handleMouseMove = (event) => {
                    mouse.current.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.current.y = -(event.clientY / window.innerHeight) * 2 + 1;
                };
                window.addEventListener('mousemove', handleMouseMove);

                animate();

                // Resize
                const handleResize = () => {
                    if (!mount) return;
                    const newW = mount.clientWidth;
                    const newH = mount.clientHeight;
                    const newAspect = newW / newH;
                    camera.left = -viewSize * newAspect;
                    camera.right = viewSize * newAspect;
                    camera.top = viewSize;
                    camera.bottom = -viewSize;
                    camera.updateProjectionMatrix();
                    renderer.setSize(newW, newH);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', handleResize);
                    if (mount && renderer.domElement) mount.removeChild(renderer.domElement);
                };
            }, []);

            return <div ref={mountRef} id="canvas-container" />;
        };

                        <div className={`relative z-10 w-full max-w-4xl mx-auto flex flex-col items-center text-center transition-all duration-1000 delay-300 ${isSplash ? 'opacity-0 translate-y-12 scale-95' : 'opacity-100 translate-y-0 scale-100'}`}>
                            
                            {/* Mancha difuminada detrás del texto para legibilidad */}
                            <div className="absolute inset-0 -m-32 text-glow-bg rounded-full opacity-100 z-0 pointer-events-none"></div>

                            <div className="relative z-10 hero-content">
                                {/* BADGE ELIMINADO */}
                                <h1 className="text-5xl sm:text-6xl md:text-8xl font-bold tracking-tighter leading-[1.1] text-transparent bg-clip-text bg-gradient-to-br from-black to-gray-600 drop-shadow-sm">Diseñando el futuro <br /> píxel a píxel.</h1>
                                <p className="text-lg md:text-2xl text-gray-600 font-medium max-w-2xl mx-auto leading-relaxed px-4 pt-6">Creo experiencias digitales que combinan la precisión de la ingeniería con la elegancia del diseño editorial.</p>
                                
                                <div className="pt-12 animate-bounce duration-[2000ms]"><IconChevronDown className="w-8 h-8 mx-auto text-black/50" /></div>
                            </div>
                        </div>
                    </header>

                    {/* CONTENIDO INFERIOR PROTEGIDO POR SPLASH */}
                    <div className={`transition-opacity duration-1000 delay-500 ${isSplash ? 'opacity-0' : 'opacity-100'}`}>
                        {/* SECCIONES RESTANTES */}
                        <section id="work" className="py-16 md:py-24 px-6 relative bg-white/50 backdrop-blur-lg">
                            <div className="max-w-4xl mx-auto">
                                <h2 className="text-2xl md:text-3xl font-bold tracking-tight mb-12 md:mb-16 text-center md:text-left">Proyectos Seleccionados</h2>
                                <div className="space-y-12 md:space-y-24 relative before:content-[''] before:absolute before:left-[19px] md:before:left-1/2 before:top-0 before:h-full before:w-[1px] before:bg-gradient-to-b before:from-transparent before:via-gray-200 before:to-transparent before:-z-10">
                                    {projects.map((project, index) => <ProjectCard key={project.id} project={project} index={index} />)}
                                </div>
                            </div>
                        </section>

                        <section id="about" className="py-16 md:py-24 px-6 bg-white border-y border-gray-100">
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-16 items-center">
                                <div className="order-2 md:order-1">
                                    <div className="w-full aspect-square rounded-[24px] md:rounded-[32px] overflow-hidden relative shadow-2xl bg-gray-100 group">
                                        <img 
                                            src="./public/Gemini_Generated_Image_lg6wyklg6wyklg6w.png" 
                                            alt="Foto de Perfil" 
                                            className="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-700 group-hover:scale-105"
                                        />
                                    </div>
                                </div>
                                <div className="space-y-6 order-1 md:order-2">
                                    <h2 className="text-2xl md:text-3xl font-bold tracking-tight">Menos ruido, más impacto.</h2>
                                    <p className="text-base md:text-lg text-gray-600 leading-relaxed font-light">Mi filosofía de trabajo se centra en la sustracción inteligente. Al eliminar lo innecesario, logro que el rendimiento, la usabilidad y la estética se conviertan en los verdaderos protagonistas de cada experiencia digital.</p>
                                    <div className="pt-4 md:pt-6 flex flex-wrap gap-3 md:gap-4">
                                        {['React', 'Tailwind CSS', 'JavaScript', 'HTML5', 'CSS3', 'Dart', 'Flutter', 'C++', 'Arduino', 'ESP32', 'MQL5',  'Node.js', 'Figma', 'Three.js'].map((skill) => <span key={skill} className="px-3 py-1.5 md:px-4 md:py-2 bg-gray-50 rounded-lg text-xs md:text-sm font-medium text-gray-600 border border-gray-100">{skill}</span>)}
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="contact" className="py-20 md:py-32 px-6">
                            <div className="max-w-2xl mx-auto text-center space-y-6 md:space-y-8">
                                <div className="inline-block p-4 rounded-2xl bg-blue-50 text-blue-600 mb-2 md:mb-4"><IconMail className="w-6 h-6 md:w-8 md:h-8" /></div>
                                <h2 className="text-3xl md:text-5xl font-bold tracking-tight text-gray-900">¿Tienes una idea en mente?</h2>
                                <p className="text-lg md:text-xl text-gray-500 font-light px-4">Cuentanos sobre tu proyecto.</p>
                                <div className="pt-6 md:pt-8">
                                    <button onClick={() => setIsModalOpen(true)} className="bg-black text-white px-8 py-4 rounded-full text-lg font-medium hover:bg-gray-800 transition-all hover:scale-105 shadow-xl shadow-gray-300 w-full md:w-auto">Iniciar una conversación</button>
                                </div>
                            </div>
                        </section>

                        <footer className="py-8 md:py-12 px-6 border-t border-gray-200 bg-white">
                            <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-xs md:text-sm text-gray-500 text-center md:text-left">© 2026 por RT Design Lab. Hecho con precisión.</div>
                                <div className="flex items-center gap-6">
                                    <a href="#" className="text-gray-400 hover:text-black transition-colors"><IconTwitter className="w-5 h-5" /></a>
                                    <a href="#" className="text-gray-400 hover:text-black transition-colors"><IconGithub className="w-5 h-5" /></a>
                                    <a href="#" className="text-gray-400 hover:text-black transition-colors"><IconLinkedin className="w-5 h-5" /></a>
                                </div>
                            </div>
                        </footer>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-md transition-opacity" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative w-full max-w-xl bg-white sm:rounded-3xl rounded-t-3xl shadow-2xl overflow-hidden scale-100 animate-fade-in max-h-[90vh] overflow-y-auto">
                                <div className="px-6 md:px-8 py-5 md:py-6 border-b border-gray-100 flex justify-between items-center bg-white/80 sticky top-0 z-20 backdrop-blur-lg">
                                    <div><h3 className="text-lg md:text-xl font-bold tracking-tight">Cuéntame sobre tu proyecto</h3><p className="text-sm text-gray-500">Selecciona las opciones para empezar.</p></div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500"><IconX className="w-5 h-5" /></button>
                                </div>
                                <form onSubmit={handleContactSubmit} className="p-6 md:p-8 space-y-8 pb-12 md:pb-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="space-y-2"><label className="text-xs font-semibold uppercase tracking-wider text-gray-500 ml-1">Tu Nombre</label><input required name="name" type="text" placeholder="Ej. Ramon García" className="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 focus:bg-white focus:border-black/20 focus:ring-0 outline-none transition-all text-base" /></div>
                                        <div className="space-y-2"><label className="text-xs font-semibold uppercase tracking-wider text-gray-500 ml-1">Tu Email</label><input required name="email" type="email" placeholder="Ejemplo@empresa.com" className="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 focus:bg-white focus:border-black/20 focus:ring-0 outline-none transition-all text-base" /></div>
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-xs font-semibold uppercase tracking-wider text-gray-500 ml-1">¿Qué necesitas construir?</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            {projectOptions.map((option) => (
                                                <label key={option.id} className="cursor-pointer relative">
                                                    <input type="radio" name="projectType" value={option.label} className="peer sr-only" required onChange={() => setSelectedProjectType(option)} />
                                                    <div className="flex items-center justify-center py-4 rounded-2xl bg-gray-50 border border-gray-100 text-sm font-medium text-gray-600 hover:bg-gray-100 peer-checked:bg-black peer-checked:text-white peer-checked:border-black peer-checked:shadow-lg transition-all duration-200 text-center px-2">{option.label}</div>
                                                </label>
                                            ))}
                                        </div>
                                        <div className="min-h-[70px] mt-2">
                                            {selectedProjectType ? (
                                                <div className="bg-blue-50/50 rounded-xl p-4 border border-blue-100 text-sm text-blue-900 animate-fade-in flex gap-3 items-start"><IconInfo className="w-5 h-5 flex-shrink-0 text-blue-600 mt-0.5" /><div><span className="font-semibold block mb-1 text-blue-700">Incluye:</span>{selectedProjectType.description}</div></div>
                                            ) : (
                                                <div className="flex items-center justify-center h-full text-sm text-gray-400 italic bg-gray-50/30 rounded-xl border border-dashed border-gray-200 p-4">Selecciona un tipo de proyecto para ver detalles</div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-xs font-semibold uppercase tracking-wider text-gray-500 ml-1">Presupuesto Estimado</label>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                            {[{ label: '$120 - $500', val: '120-500' }, { label: '$500 - $1k', val: '500-1000' }, { label: '$1k - $3k', val: '1000-3000' }, { label: '+ $3k', val: '3000+' }].map((range) => (
                                                <label key={range.val} className="cursor-pointer relative"><input type="radio" name="budget" value={range.val} className="peer sr-only" required /><div className="text-center py-3 rounded-xl border border-gray-200 text-xs font-medium text-gray-600 bg-white hover:border-gray-400 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:border-blue-500 peer-checked:ring-1 peer-checked:ring-blue-500 transition-all">{range.label}</div></label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-2">
                                        <label className="text-xs font-semibold uppercase tracking-wider text-gray-500 ml-1">¿Algo más que deba saber?</label>
                                        <textarea name="message" rows="3" placeholder="Detalles..." className="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 focus:bg-white focus:border-black/20 focus:ring-0 outline-none transition-all resize-none text-base leading-relaxed"></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg hover:bg-gray-800 transition-transform active:scale-[0.98] flex items-center justify-center gap-2 shadow-xl shadow-gray-200">Enviar Solicitud <IconSend className="w-4 h-4 ml-1" /></button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
